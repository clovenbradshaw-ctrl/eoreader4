<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eoreader4</title>
  <link rel="stylesheet" href="src/ui/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>eoreader4</h1>
      <span id="status" class="status">booting…</span>
      <span class="spacer"></span>
      <select id="backend" title="Model backend">
        <option value="echo">echo (instant, deterministic)</option>
        <option value="wllama">wllama · SmolLM2-135M (CPU)</option>
        <option value="webllm">webllm · Llama-3.2-3B (WebGPU)</option>
      </select>
    </header>
    <main>
      <section id="doc-pane">
        <h2>Document
          <span class="hint">(optional — chat works without one)</span>
          <span class="spacer"></span>
          <span class="tabs" id="doc-tabs">
            <button type="button" class="tab active" data-tab="text">Text</button>
            <button type="button" class="tab" data-tab="graph">Graph</button>
            <button type="button" class="tab" data-tab="log">Log</button>
            <button type="button" class="tab" data-tab="feed">Feed</button>
            <button type="button" class="tab" data-tab="predict">Predict</button>
          </span>
        </h2>
        <div class="dropzone" id="dropzone">
          <input type="file" id="file-input" accept=".txt,.md,text/plain">
          <p>Drop a text file, or <label for="file-input">browse</label>.</p>
        </div>
        <div id="doc-view"></div>
        <div id="graph-view" hidden></div>
        <div id="log-view" hidden></div>
        <div id="feed-view" hidden></div>
        <div id="predict-view" hidden></div>
      </section>
      <section id="chat-pane">
        <h2>Chat</h2>
        <div id="messages"></div>
        <form id="composer">
          <textarea id="input" placeholder="Ask anything — a doc makes answers grounded…" rows="2"></textarea>
          <button type="submit" id="send">Send</button>
        </form>
      </section>
      <section id="audit-pane">
        <h2>Audit <button id="export-audit" class="small">Export JSONL</button></h2>
        <div id="audit-view"></div>
      </section>
    </main>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
